<html xmlns:th="http://www.thymeleaf.org">
    <style>
         body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }
        
        .main {
            margin: auto;
            padding: 30px;
            background-color: #ffffff;
            width: 60%;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-size: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px 6px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 5px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:hover,
        select:hover {
            border-color: #6ea96e;
        }

        .error {
            border-color: #d93025;
            border-width: 2px;
            background-color: #ffecec;
        }

        .error-message{
            color: #d93025;
            font-size: 16px;
        }
        
        .radio {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        } 

        .radio input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #3c6d3c;
            cursor: pointer;
        }
        
        .radio label {
            margin-right: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        button {
            background-color: #3c6d3c;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2c4f2c;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #6ea96e;
            color: white;
            padding: 20px 40px;
            font-size: 18px;
        }

        header a, h1{
            font-size: 20px;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
        }

        header a:visited {
            color: white;
            text-decoration: none;
        }

        footer {
            background: #6ea96e;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            text-align: center;
            margin-top: 40px;
            bottom:0;
            position:fixed;
            width:100%;
        }

        .error-info{
            background-color: #f8d7da; 
            color: #721c24; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #f5c6cb; 
            border-radius: 4px;"
        }

        .languages{
            margin-right: 0;
            margin-left: auto;
        }

        h2 {
            font-size: 35px;
            color:rgb(57, 92, 57);
            padding: 8px 12px;
            text-align: center;
        }

    </style>
    <head>
        <title>Dönerverleih UdE</title>
    </head>
    <body>
        <th:block th:replace="~{fragments/kopffuss :: kopf}" />
        
        <div th:if="${info}" class="error-info">
            <strong>Fehler:</strong> <span th:text="${info}">Fehlermeldung</span>
        </div>

        <form th:action="@{/doener/{id}(id=${dformular.id}, sprache=${#locale})}" method="post" th:object="${dformular}">
            
            <h2 th:text="#{doener.bearbeiten.titel(${id})}">Döner bearbeiten...</h2>

            <div class="main">
                <label for="bezeichnung" th:text="#{doener.bezeichnung}">Bezeichnung</label>
                <input type="text" th:field="*{bezeichnung}" th:errorclass="error" id="bezeichnung">
                <span th:if="${#fields.hasErrors('bezeichnung')}" th:errors="*{bezeichnung}" class="error-message"></span>

                <br><br>

                <label for="preis" th:text="#{doener.preis}">Preis</label>
                <input type="number" th:field="*{preis}" th:errorclass="error" id="preis">
                <span th:if="${#fields.hasErrors('preis')}" th:errors="*{preis}" class="error-message"></span>

                <br><br>

                <label for="vegetarizitaet" th:text="#{doener.vegetarizitaet}">Vegetarizität</label>
                <div class="radio">
                    <input type="radio" th:field="*{vegetarizitaet}" value="0" id="unvegetarisch">
                    <label for="unvegetarisch" th:text="#{doener.vegetarizitaet.0}">unvegetarisch</label>

                    <input type="radio" th:field="*{vegetarizitaet}" value="1" id="vegetarisch">
                    <label for="vegetarisch" th:text="#{doener.vegetarizitaet.1}">vegetarisch</label>

                    <input type="radio" th:field="*{vegetarizitaet}" value="2" id="vegan">
                    <label for="vegan" th:text="#{doener.vegetarizitaet.2}">vegan</label>
                </div>

                <br><br>

                <label for="bestand" th:text="#{doener.bestand}">Bestand</label>
                <input type="number" th:field="*{bestand}" th:errorclass="error" id="bestand">
                <span th:if="${#fields.hasErrors('bestand')}" th:errors="*{bestand}" class="error-message"></span>
                
                <br></br>

                <label for="zutaten" th:text="#{doener.zutaten}">Zutaten</label>
                <select name="zutaten" multiple>
                        <option th:each="zutat :${zutaten}" th:value="${zutat.ean}" 
                            th:text=" ${zutat.name} + ' (' +  ${zutat.vegetarizitaet} + '=' + #{doener.vegetarizitaet.__${zutat.vegetarizitaet}__} + ') ' ">  <!-- selected fehlt hier, bin aber noch ratlos-->
                </select>

                <br><br>

                <button type="submit">OK</button>
                <button type="reset">Abbruch</button>

            </div>

        </form>
        <th:block th:replace="~{fragments/kopffuss :: fuss}" />
    </body>
</html>
