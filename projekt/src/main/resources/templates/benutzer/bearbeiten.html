<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Der Digitale Dönerverleih</title>
    </head>
    <body>
        <form th:action="@{/benutzer/{username}(username=${formular.username})}" method="post" th:object="${formular}">
            <h1>Benutzer <span th:text="${username}">benutzer</span> bearbeiten... </h1>
            
            <br><br>

            <label for="Name">Name</label>
            <input type="text" th:field="*{name}" name="Name" id="name">

            <br><br>
            
            <label for="Digitalpostanschrift">Digitalpostanschrift</label>
            <input type="email" th:field="*{email}" name="Digitalpostanschrift" id="email">

            <br><br>

            <div id="radio">
                <label for="Vegetarizität">Vegetarizität</label>

                <input type="radio" th:field="*{vegetarizitaet}" name="Vegetarizität" id="unvegetarisch" value="0">
                <label for="">unvegetarisch</label>

                <input type="radio" th:field="*{vegetarizitaet}" name="Vegetarizität" id="vegetarisch" value="1">
                <label for="vegetarisch">vegetarisch</label>

                <input type="radio" th:field="*{vegetarizitaet}" name="Vegetarizität" id="vegan" value="2">
                <label for="vegan">vegan</label>
            </div>

            <br><br>

            <label for="Rolle">Rolle</label>
            <select name="Rolle" th:field="*{rolle}" id="rolle">
                <option value="ADMIN">ADMIN</option>
                <option value="KUNDE">KUNDE</option>
                <option value="GESPERRT">GESPERRT</option>
            </select>

            <br><br>

            <label for="Losung">Losung</label>
            <input type="password" th:field="*{passwort}" name="Losung">

            <br><br>

            <label for="LosungW">Losung(Wiederh.)</label>
            <input type="password" name="LosungW">

            <br><br>

            <button type="submit">OK</button>
            <button type="reset">Abbruch</button>
        </form>
    </body>
</html>
