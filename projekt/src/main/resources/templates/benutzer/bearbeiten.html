<html xmlns:th="http://www.thymeleaf.org">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }
        
        .main {
            margin: auto;
            padding: 30px;
            background-color: #ffffff;
            width: 60%;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-size: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px 6px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 5px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:hover,
        select:hover {
            border-color: #6ea96e;
        }
        
        .error {
            border-color: #d93025;
            border-width: 2px;
            background-color: #ffecec;
        }

        .error-message{
            color: #d93025;
            font-size: 16px;
        }
        
        .radio {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        } 

        .radio input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #3c6d3c;
            cursor: pointer;
        }
        
        .radio label {
            margin-right: 12px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .dropdown select {
            width: 100%;
        }
        
        button {
            background-color: #3c6d3c;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2c4f2c;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #6ea96e;
            color: white;
            padding: 20px 40px;
            font-size: 18px;
        }

        header a, h1{
            font-size: 20px;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
        }

        header a:visited {
            color: white;
            text-decoration: none;
        }

        footer {
            background: #6ea96e;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            text-align: center;
            margin-top: 40px;
            bottom:0;
            position:fixed;
            width:100%;
        }

        .error-info{
            background-color: #f8d7da; 
            color: #721c24; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #f5c6cb; 
            border-radius: 4px;"
        }

        .languages{
            margin-right: 0;
            margin-left: auto;
        }

        h2 {
            font-size: 35px;
            color:rgb(57, 92, 57);
            padding: 8px 12px;
            text-align: center;
        }

    </style>

    <head>
        <title>Dönerverleih UdE</title>
    </head>

    <body>
        <th:block th:replace="~{fragments/kopffuss :: kopf}" />

        <div th:if="${info}" class="error-info">
            <strong>Fehler:</strong> <span th:text="${info}">Fehlermeldung</span>
        </div>

        <form th:action="@{/benutzer/{loginName}(loginName=${formular.loginName}, sprache=${#locale})}" method="post" th:object="${formular}">
            
            <h2 th:text="#{benutzer.bearbeiten.titel(${loginName})}">Benutzer bearbeiten...</h2>
            
            <div class="main">

                <label for="name" th:text="#{benutzer.name}">Name</label>
                <input type="text" th:field="*{name}" th:errorclass="error" id="name">
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></span>

                <br><br>
                
                <label for="email" th:text="#{benutzer.email}">Digitalpostanschrift</label>
                <input type="text" th:field="*{email}" th:errorclass="error" id="email">
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>

                <br><br>

                <label for="vegetarizitaet" th:text="#{benutzer.vegetarizitaet}">Vegetarizität</label>
                <div class="radio">
                    <input type="radio" th:field="*{vegetarizitaet}" value="0" id="unvegetarisch">
                    <label for="unvegetarisch" th:text="#{benutzer.vegetarizitaet.unvegetarisch}">unvegetarisch</label>

                    <input type="radio" th:field="*{vegetarizitaet}" value="1" id="vegetarisch">
                    <label for="vegetarisch" th:text="#{benutzer.vegetarizitaet.vegetarisch}">vegetarisch</label>

                    <input type="radio" th:field="*{vegetarizitaet}" value="2" id="vegan">
                    <label for="vegan" th:text="#{benutzer.vegetarizitaet.vegan}">vegan</label>
                </div>

                <br><br>

                <label for="rolle" th:text="#{benutzer.rolle}">Rolle</label>
                <div class="dropdown">
                    <select th:field="*{rolle}" id="rolle">
                        <option value="ADMIN" th:text="#{benutzer.rolle.admin}">ADMIN</option>
                        <option value="KUNDE" th:text="#{benutzer.rolle.kunde}">KUNDE</option>
                        <option value="GESPERRT" th:text="#{benutzer.rolle.gesperrt}">GESPERRT</option>
                    </select>
                </div>

                <br><br>

                <label for="losung" th:text="#{benutzer.losung}">Losung</label>
                <input type="password" th:field="*{losung}" th:errorclass="error" id="losung">
                <span th:if="${#fields.hasErrors('losung')}" th:errors="*{losung}" class="error-message"></span>

                <br><br>

                <label for="losungwh" th:text="#{benutzer.losungwh}">Losung(Wiederh.)</label>
                <input type="password" th:field="*{losungwh}" th:errorclass="error" id="losungwh">
                <span th:if="${#fields.hasErrors('losungwh')}" th:errors="*{losungwh}" class="error-message"></span>

                <br><br>

                <button type="submit">OK</button>
                <button type="reset">Abbruch</button>
            </div>
        </form>
        <th:block th:replace="~{fragments/kopffuss :: fuss}" />
    </body>
</html>
